<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能陪伴问答机器人 - 网页演示</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;background:linear-gradient(160deg,#e8f4ff,#f5f7fa 50%,#fff8f0);color:#1a1a1a}
.wrap{max-width:800px;margin:0 auto;padding:48px 24px;text-align:center}
.logo{width:72px;height:72px;margin:0 auto 16px;border-radius:20px;object-fit:contain;display:block;box-shadow:0 12px 32px rgba(22,119,255,.15)}
h1{font-size:26px;margin-bottom:8px}
.sub{color:#666;margin-bottom:40px;font-size:15px}
.card{display:block;padding:32px 28px;border-radius:20px;text-decoration:none;color:inherit;margin-bottom:20px;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.08);transition:transform .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.card.main{background:linear-gradient(145deg,#1677ff,#4096ff);color:#fff}
.card h2{font-size:22px;margin-bottom:8px}
.card p{font-size:14px;opacity:.9;line-height:1.6;margin-bottom:16px}
.card .go{font-weight:600;font-size:16px}
.tag{display:inline-block;background:rgba(255,255,255,.3);padding:4px 10px;border-radius:6px;font-size:12px;margin-bottom:12px}
.note{margin-top:32px;font-size:13px;color:#8c8c8c;line-height:1.8}
.note b{color:#1677ff}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="assets/company-logo.png" alt="盛越智健" />
  <h1>智能陪伴问答机器人</h1>
  <p class="sub">网页演示 · 无需安装 · 无需联网</p>

  <a href="管理后台演示.html" class="card main">
    <span class="tag">推荐 · 双击即可打开</span>
    <h2>🖥️ 云端管理后台</h2>
    <p>7 大菜单模块 · 四级权限切换 · 完整按钮布局演示<br>左侧导航 + 顶部通栏 + 列表/表单/看板</p>
    <span class="go">点击进入管理后台 →</span>
  </a>

  <p class="note">
    <b>打不开？</b>请直接双击文件夹中的<br>
    <b>「管理后台演示.html」</b> 或 <b>「打开演示.bat」</b><br>
    使用 Chrome、Edge 浏览器打开，不要用 WPS 预览
  </p>
</div>
</body>
</html>
