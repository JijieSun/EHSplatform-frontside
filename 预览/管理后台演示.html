<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能陪伴机器人管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}
a{color:#1677ff;text-decoration:none}
.app{min-height:100vh;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#e6f4ff;border-bottom:1px solid #91caff;font-size:13px;color:#0958d9}
.bar b{font-weight:700}.bar span{flex:1}
.bar button{border:none;background:transparent;color:#1677ff;cursor:pointer;font-size:13px}
.header{height:56px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{width:32px;height:32px;border-radius:8px;object-fit:contain;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;flex:1}
.header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-actions button,.header-actions select{font-size:13px;padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;cursor:pointer}
.header-actions .logout{color:#ff4d4f;border:none;background:transparent}
.body{display:flex;flex:1;min-height:calc(100vh - 56px)}
/* ===== 侧栏导航（新设计） ===== */
.sidebar{
  width:248px;background:#fff;border-right:1px solid #e8ecf1;
  flex-shrink:0;display:flex;flex-direction:column;
  box-shadow:4px 0 24px rgba(15,23,42,.04);
  transition:width .25s ease;overflow:hidden
}
.sidebar.collapsed{width:72px}
.sidebar-brand{
  padding:18px 16px 14px;border-bottom:1px solid #f1f5f9;
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
.sidebar-brand .brand-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;object-fit:contain
}
.sidebar-brand .brand-text{font-size:13px;font-weight:600;color:#1e293b;line-height:1.3}
.sidebar-brand .brand-text small{display:block;font-size:11px;font-weight:400;color:#94a3b8;margin-top:2px}
.sidebar.collapsed .brand-text{display:none}
.nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 8px 16px}
.nav-scroll::-webkit-scrollbar{width:4px}
.nav-scroll::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
.nav-group-label{
  font-size:11px;font-weight:600;color:#94a3b8;
  padding:14px 12px 6px;letter-spacing:.06em
}
.sidebar.collapsed .nav-group-label{display:none}
.nav-item{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:9px 10px;margin-bottom:2px;border:none;background:transparent;
  border-radius:10px;cursor:pointer;text-align:left;
  font-size:14px;color:#475569;transition:all .18s ease;position:relative
}
.nav-item:hover{background:#f8fafc;color:#1e293b}
.nav-item.active{
  background:linear-gradient(90deg,#eff6ff,#f8fbff);
  color:#1677ff;font-weight:600
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:#1677ff;border-radius:0 3px 3px 0
}
.nav-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:#f1f5f9;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background .18s
}
.nav-item:hover .nav-icon{background:#e2e8f0}
.nav-item.active .nav-icon{background:#dbeafe}
.nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-arrow{display:none}
.nav-arrow{
  font-size:10px;color:#94a3b8;transition:transform .25s ease;flex-shrink:0;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:4px
}
.nav-item:hover .nav-arrow{color:#64748b}
.nav-arrow.open{transform:rotate(180deg)}
.sub-list{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  margin-left:16px;padding-left:14px;border-left:2px solid #e2e8f0;
  margin-bottom:4px
}
.sub-list.open{max-height:600px}
.sub-item{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:8px 10px;margin:2px 0;border:none;background:transparent;
  border-radius:8px;cursor:pointer;text-align:left;
  font-size:13px;color:#64748b;transition:all .15s
}
.sub-item:hover{background:#f8fafc;color:#334155}
.sub-item.active{background:#eff6ff;color:#1677ff;font-weight:600}
.sub-dot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.sub-item.active .sub-dot{background:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.2)}
.sub-item.alert-item .sub-dot{background:#ff4d4f;box-shadow:0 0 0 3px rgba(255,77,79,.2)}
.sub-badge{
  margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;
  background:#fff1f0;color:#ff4d4f;font-weight:600
}
.sidebar-footer{
  padding:10px 12px;border-top:1px solid #f1f5f9;flex-shrink:0
}
.collapse-side{
  width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;
  background:#f8fafc;color:#64748b;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s
}
.collapse-side:hover{background:#f1f5f9;color:#1677ff;border-color:#bfdbfe}
.sidebar.collapsed .collapse-side span{display:none}
.main{flex:1;padding:16px 20px;overflow:auto}
.breadcrumb{color:#8c8c8c;margin-bottom:12px;font-size:13px}
.breadcrumb span{cursor:pointer}.breadcrumb span:hover{color:#1677ff}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:18px;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fafafa;border-radius:8px;padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#1677ff;margin-top:8px}
.filter{display:flex;flex-wrap:wrap;gap:10px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid #f0f0f0;align-items:center}
.filter input,.filter select{padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.toolbar .hint{margin-left:auto;font-size:12px;color:#8c8c8c}
.toolbar.batch,.toolbar.short{background:#fafafa;border:1px dashed #d9d9d9;border-radius:6px;padding:10px 12px}
.toolbar.short{background:linear-gradient(90deg,#fff7e6,#fff);border-color:#ffd591}
.toolbar.batch::before{content:"批量操作 ";font-size:12px;color:#8c8c8c}
.toolbar.short::before{content:"快捷操作 ";font-size:12px;color:#d46b08;font-weight:600}
.btn{padding:8px 16px;border-radius:4px;border:1px solid #d9d9d9;background:#f5f5f5;cursor:pointer;font-size:14px}
.btn-primary{background:#1677ff;color:#fff;border-color:#1677ff}
.btn-danger{background:#ff4d4f;color:#fff;border-color:#ff4d4f}
.btn-export{background:#52c41a;color:#fff;border-color:#52c41a}
.btn-alert{animation:pulse 2s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 6px rgba(255,77,79,.3)}}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #f0f0f0;padding:10px 12px;text-align:left}
th{background:#fafafa;font-weight:600}
tr:nth-child(even){background:#fafafa}
.link-btn{border:none;background:none;color:#1677ff;cursor:pointer;margin-right:8px;font-size:13px}
.link-danger{color:#ff4d4f}
.pager{margin-top:16px;text-align:right;color:#8c8c8c;font-size:13px}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.chart{height:180px;background:linear-gradient(180deg,#f5f9ff,#fff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#bfbfbf}
.alert-list li{padding:8px 0;border-bottom:1px solid #f0f0f0;list-style:none;font-size:14px}
.alert-list .danger{color:#ff4d4f}
.alert-list .warn{color:#fa8c16}
.form-row{margin-bottom:16px;display:flex;align-items:center;gap:12px}
.form-row label{width:140px;color:#595959}
.form-row input{flex:1;max-width:360px;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-mask.show{display:flex}
.modal{background:#fff;border-radius:8px;width:480px;max-width:90%}
.modal.edit-modal{width:min(760px,96%);max-height:92vh;display:flex;flex-direction:column}
.modal.edit-modal .modal-bd{flex:1;overflow-y:auto;max-height:calc(92vh - 110px)}
.edit-sec{margin-bottom:18px}
.edit-sec h4{margin:0 0 10px;font-size:14px;font-weight:600;color:#1e293b;padding-left:8px;border-left:3px solid #1677ff}
.edit-sub{margin-bottom:8px;padding:10px;background:#fafafa;border-radius:6px}
.edit-contact{margin-bottom:12px;padding:12px;border:1px solid #f0f0f0;border-radius:8px;background:#fafafa}
.edit-contact .ct-label{font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:8px}
.edit-grid .form-row{margin:0;flex-direction:column;align-items:stretch;gap:4px}
.edit-grid .form-row label{width:auto;font-size:12px;color:#8c8c8c}
.edit-grid .form-row input,.edit-grid .form-row select{max-width:none;width:100%}
.form-row-inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.form-row-inline label{font-size:12px;color:#595959}
.device-muted{color:#94a3b8}
.modal-hd{padding:16px 20px;border-bottom:1px solid #f0f0f0;font-weight:600;display:flex;justify-content:space-between}
.modal-bd{padding:20px}
.modal-ft{padding:12px 20px;border-top:1px solid #f0f0f0;text-align:right;display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:4px;z-index:2000;display:none;font-size:14px}
.toast.show{display:block}
.dot{display:inline-block;width:6px;height:6px;background:#ff4d4f;border-radius:50%;margin-right:6px}
.hidden{display:none!important}
.msg-menu{position:absolute;right:0;top:100%;margin-top:6px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);min-width:280px;z-index:200;padding:6px 0}
.msg-menu-item{display:block;width:100%;text-align:left;border:none;background:none;padding:10px 14px;cursor:pointer;font-size:13px}
.msg-menu-item:hover{background:#f5f5f5}
.msg-menu-item b{display:block;margin-bottom:4px}
.msg-menu-item small{color:#8c8c8c;font-size:12px}
.perm-tags{display:flex;flex-wrap:wrap;gap:4px}
.perm-tag{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid #d9d9d9}
.perm-tag.on{background:#1677ff;color:#fff;border-color:#1677ff}
.essence-full{white-space:pre-wrap;line-height:1.75;max-height:none}
.essence-clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.sidebar.collapsed .sub-list{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px 6px}
.sidebar.collapsed .nav-icon{margin:0}
.user-link{border:none;background:none;color:#1677ff;cursor:pointer;font-size:14px;padding:0}
.user-link:hover{text-decoration:underline}
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;display:none}
.drawer-mask.show{display:flex;justify-content:flex-end}
.drawer-panel{width:min(560px,100%);height:100%;background:#fff;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-hd{padding:16px 20px;border-bottom:1px solid #f0f0f0;font-weight:600;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.drawer-bd{padding:16px 20px 32px}
.detail-sec{margin-bottom:22px}
.detail-sec h4{margin:0 0 10px;font-size:14px;font-weight:600;color:#1e293b;padding-left:8px;border-left:3px solid #1677ff}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin-bottom:8px}
.detail-grid .lbl{color:#8c8c8c}
.detail-grid .val{color:#1a1a1a}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.detail-table th,.detail-table td{border:1px solid #f0f0f0;padding:8px 10px;text-align:left}
.detail-table th{background:#fafafa;font-weight:600}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px}
.tag-ok{background:#f6ffed;color:#52c41a}
.tag-warn{background:#fff7e6;color:#fa8c16}
.tag-off{background:#f5f5f5;color:#8c8c8c}
.tag-danger{background:#fff1f0;color:#ff4d4f}
.empty-tip{color:#bfbfbf;font-size:13px;padding:12px 0}
.page-desc{margin:-8px 0 14px;font-size:13px;color:#64748b;line-height:1.65}
.summary-cell{max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-bar{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin:4px 0}
.progress-bar i{display:block;height:100%;background:#1677ff;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div class="bar" id="demoBar">
    <b>管理后台演示</b>
    <span>纯网页版 · 无需联网 · 双击即可打开 · 右上角切换角色</span>
    <button onclick="document.getElementById('demoBar').classList.add('hidden')">关闭</button>
  </div>
  <header class="header">
    <img class="logo" src="company-logo.png" alt="盛越智健" />
    <h1>智能陪伴机器人管理后台</h1>
    <div class="header-actions">
      <div class="msg-wrap" style="position:relative;display:inline-block">
        <button onclick="toggleMsgMenu()">🔔 消息中心(3)</button>
        <div id="msgMenu" class="msg-menu hidden">
          <button class="msg-menu-item" onclick="closeMsgMenu();navigate('/elder-care/sos')"><b>紧急呼救待处理</b><small>张秀英 10:32 呼救</small></button>
          <button class="msg-menu-item" onclick="closeMsgMenu();navigate('/knowledge/audit')"><b>知识库待审核</b><small>12 条待审内容</small></button>
          <button class="msg-menu-item" onclick="closeMsgMenu();navigate('/elder-care/community')"><b>社区服务待分配</b><small>2 条未分配</small></button>
        </div>
      </div>
      <button onclick="navigate('/account/settings')">⚙ 账号设置</button>
      <span>演示管理员</span>
      <select id="roleSelect" onchange="changeRole()">
        <option value="super_admin">超级管理员</option>
        <option value="operator">运营人员</option>
        <option value="specialist">普通专员</option>
        <option value="readonly">只读账号</option>
      </select>
      <button class="logout" onclick="toast('已退出（演示）')">退出登录</button>
    </div>
  </header>
  <div class="body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-mask" id="modal">
  <div class="modal">
    <div class="modal-hd">编辑 <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd">
      <div class="form-row"><label>名称</label><input placeholder="请输入"></div>
      <div class="form-row"><label>备注</label><input placeholder="请输入"></div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn" onclick="toast('已重置')">重置</button>
      <button class="btn btn-primary" onclick="closeModal();toast('保存成功')">保存</button>
    </div>
  </div>
</div>
<div class="modal-mask" id="communityCatModal" onclick="if(event.target===this)closeCommunityCat()">
  <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
    <div class="modal-hd">选择服务类型 <button onclick="closeCommunityCat()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd" style="display:flex;gap:12px;justify-content:center;padding:24px">
      <button class="btn" style="flex:1;padding:20px 8px" onclick="pickCommunityCat('家政')">🧹 家政</button>
      <button class="btn" style="flex:1;padding:20px 8px" onclick="pickCommunityCat('陪诊')">🏥 陪诊</button>
      <button class="btn" style="flex:1;padding:20px 8px" onclick="pickCommunityCat('物业')">🏢 物业</button>
    </div>
  </div>
</div>
<div class="modal-mask" id="communityFormModal" onclick="if(event.target===this)closeCommunityForm()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd"><span id="communityFormTitle">新增服务</span> <button onclick="closeCommunityForm()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd">
      <div class="form-row"><label>服务类型</label><span id="cf-category" class="tag tag-warn">—</span></div>
      <div class="form-row"><label>预约时间</label><input id="cf-time" type="datetime-local"></div>
      <div class="form-row"><label>服务人员</label><input id="cf-staff" placeholder="留空则待分配"></div>
      <div class="form-row"><label>具体服务项目</label><input id="cf-item" placeholder="请填写服务内容"></div>
      <div class="form-row"><label>用户名</label><input id="cf-user" placeholder="必填"></div>
      <div class="form-row"><label>手机号</label><input id="cf-phone" placeholder="必填"></div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeCommunityForm()">取消</button><button class="btn btn-primary" onclick="saveCommunityOrder()">确认添加</button></div>
  </div>
</div>
<div class="modal-mask" id="assignModal" onclick="if(event.target===this)closeAssign()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">分配服务人员 <button onclick="closeAssign()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd"><p id="assignInfo" style="font-size:13px;color:#64748b;line-height:1.6"></p>
    <div class="form-row"><label>服务人员</label><select id="assignStaff"></select></div></div>
    <div class="modal-ft"><button class="btn" onclick="closeAssign()">取消</button><button class="btn btn-primary" onclick="confirmAssign()">确认分配</button></div>
  </div>
</div>
<div class="modal-mask" id="iotLogModal" onclick="if(event.target===this)closeIotLog()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd"><span id="iotLogTitle">设备日志</span> <button onclick="closeIotLog()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd" id="iotLogBody"></div>
    <div class="modal-ft"><button class="btn" onclick="closeIotLog()">关闭</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="drawer-mask" id="userDrawer" onclick="if(event.target===this)closeUserDetail()">
  <div class="drawer-panel" onclick="event.stopPropagation()">
    <div class="drawer-hd"><span id="userDrawerTitle">用户档案</span>
      <span>
        <button class="btn btn-primary" id="drawerEditBtn" style="display:none;padding:4px 12px;font-size:12px;margin-right:8px" onclick="openUserEditFromDrawer()">编辑完整档案</button>
        <button onclick="closeUserDetail()" style="border:none;background:none;cursor:pointer;font-size:20px">×</button>
      </span>
    </div>
    <div class="drawer-bd" id="userDrawerBody"></div>
  </div>
</div>
<div class="modal-mask" id="userEditModal">
  <div class="modal edit-modal" onclick="event.stopPropagation()">
    <div class="modal-hd"><span id="userEditTitle">编辑用户档案</span><button onclick="closeUserEdit()" style="border:none;background:none;cursor:pointer;font-size:18px">×</button></div>
    <div class="modal-bd" id="userEditBody"></div>
    <div class="modal-ft">
      <button class="btn" onclick="closeUserEdit()">取消</button>
      <button class="btn" onclick="resetUserEdit()">重置</button>
      <button class="btn btn-primary" onclick="saveUserEdit()">保存档案</button>
    </div>
  </div>
</div>
<script>
const ROLE_CAPS={super_admin:['view','create','update','delete','export','audit'],operator:['view','create','update','export','audit'],specialist:['view','export','audit'],readonly:['view']};
const MENUS=[
  {title:'首页',path:'/dashboard',icon:'📊',roles:['super_admin','operator','specialist','readonly']},

return h+`</tbody></table><div class="pager"><button class="btn" onclick="if(memoirAnsPage>1){memoirAnsPage--;render()}">上一页</button> <button class="btn" onclick="if(start+ps<all.length){memoirAnsPage++;render()}">下一页</button></div></div>`}
const ADMIN_ACCOUNTS=[
  {id:1,account:'admin',name:'系统管理员',role:'super_admin',status:'正常',perms:['view','create','update','delete','export','audit']},
  {id:2,account:'operator01',name:'运营-小王',role:'operator',status:'正常',perms:['view','create','update','export','audit']},
  {id:3,account:'readonly01',name:'只读-小张',role:'readonly',status:'禁用',perms:['view']}
];
const PERM_LABELS=[{k:'view',l:'查看'},{k:'create',l:'新增'},{k:'update',l:'编辑'},{k:'delete',l:'删除'},{k:'export',l:'导出'},{k:'audit',l:'审核'}];
function renderSysAccountPage(){let h=`<div class="card"><h2>账号权限管理</h2><p class="page-desc">状态列后展示权限列表，可编辑每项权限；支持禁用账号。</p>${renderActions(PAGES['/system/account'].actions||[])}
<table><thead><tr><th>账号</th><th>姓名</th><th>角色</th><th>状态</th><th>使用权限</th><th>操作</th></tr></thead><tbody>`;
ADMIN_ACCOUNTS.forEach(a=>{const tags=PERM_LABELS.map(p=>`<span class="perm-tag ${a.perms.includes(p.k)?'on':''}">${p.l}</span>`).join('');
h+=`<tr><td>${a.account}</td><td>${a.name}</td><td>${a.role}</td><td><span class="tag ${a.status==='正常'?'tag-ok':'tag-danger'}">${a.status}</span></td><td><div class="perm-tags">${tags}</div></td><td><button class="link-btn" onclick="toast('编辑权限（演示）')">编辑权限</button> <button class="link-btn link-danger" onclick="a.status=a.status==='正常'?'禁用':'正常';render();toast('已切换状态')">${a.status==='正常'?'禁用':'启用'}</button></td></tr>`});
return h+'</tbody></table></div>'}
function renderAccountSettingsPage(){return `<div class="card"><button class="btn" onclick="navigate('/dashboard')">← 返回</button><h2>账号设置</h2>
<div class="detail-sec"><h4>基本信息</h4><div class="form-row"><label>登录账号</label><input value="admin" readonly></div><div class="form-row"><label>显示姓名</label><input value="演示管理员"></div><div class="form-row"><label>手机</label><input value="138****0001"></div><button class="btn btn-primary" onclick="toast('已保存')">保存</button></div>
<div class="detail-sec"><h4>修改密码</h4><div class="form-row"><label>当前密码</label><input type="password"></div><div class="form-row"><label>新密码</label><input type="password"></div><button class="btn btn-primary" onclick="toast('密码已修改')">确认修改</button></div>
<div class="detail-sec"><h4>登录设备记录</h4><table><thead><tr><th>时间</th><th>设备</th><th>IP</th><th>状态</th></tr></thead><tbody>
<tr><td>2026-05-28 11:20</td><td>Chrome · macOS</td><td>192.168.1.108</td><td><span class="tag tag-ok">当前</span></td></tr>
<tr><td>2026-05-27 09:15</td><td>Safari · iPhone</td><td>10.0.0.52</td><td>历史</td></tr></tbody></table></div></div>`}
function renderTable(cols,rows){let h='<table><thead><tr><th><input type="checkbox"></th>';cols.forEach(c=>h+=`<th>${c}</th>`);if(rows)h+='<th>操作</th>';h+='</tr></thead><tbody>';for(let i=1;i<=5;i++){h+='<tr><td><input type="checkbox"></td>';cols.forEach(c=>h+=`<td>${c}示例${i}</td>`);if(rows){h+='<td>';if(can('update'))h+='<button class="link-btn" onclick="document.getElementById(\'modal\').classList.add(\'show\')">编辑</button>';if(can('delete'))h+='<button class="link-btn link-danger">删除</button>';if(can('view'))h+='<button class="link-btn">预览</button>';h+='</td>'}h+='</tr>'}h+='</tbody></table><div class="pager">共 100 条 · 上一页 1 2 3 下一页</div>';return h}
function renderMain(){const el=document.getElementById('main');const pg=path==='/users/memoir-answers'?PAGES['/users/memoir-answers']:(PAGES[path]||PAGES['/dashboard']);let h=`<div class="breadcrumb">${breadcrumb()}</div>`;
if(pg.type==='dash'){h+=`<div class="card"><h2>首页控制台 · 数据总览</h2>${renderActions(DASH_ACTIONS)}
<div class="stats"><div class="stat"><div>用户总量</div><div class="num">12,580</div></div><div class="stat"><div>今日对话量</div><div class="num">8,426</div></div><div class="stat"><div>问卷采集完成率</div><div class="num">76.4%</div></div><div class="stat"><div>呼救记录(月)</div><div class="num">23</div></div></div>
<div class="dash-grid"><div class="card"><b>近7日对话量趋势</b><div class="chart">图表区域（演示）</div></div><div class="card"><b>待办告警</b><ul class="alert-list"><li class="danger">10:32 紧急呼救 · 张**</li><li class="warn">09:15 待审核知识点 12条</li><li>昨日 异常登录 2次</li></ul></div></div></div>`}
else if(pg.config&&pg.fields){h+=`<div class="card"><h2>${pg.title}</h2>${renderActions(pg.actions||[])}`;pg.fields.forEach(f=>{const[l,v]=f.split('|');h+=`<div class="form-row"><label>${l}</label><input value="${v}" readonly></div>`});h+='</div>'}
else if(pg.type==='userList'){h+=`<div class="card"><h2>${pg.title}</h2><div class="filter"><input placeholder="姓名 / 手机 / 设备号"><button class="btn" onclick="toast('查询中')">查询</button><button class="btn" onclick="toast('筛选中')">筛选</button></div>${renderActions(pg.actions||[])}${renderUserListTable()}</div>`}
else if(pg.type==='shortQa'){h+=`<div class="card"><h2>${pg.title}</h2><p class="page-desc">储存用户<strong>当前对话记忆</strong>，每次对话结束后重新生成，约为 <strong>2000 字</strong> 摘要。</p>${renderArchiveFilter()}${renderActions(pg.actions||[])}${renderShortQaTable()}</div>`}
else if(pg.type==='chatArchive'){h+=`<div class="card"><h2>${pg.title}</h2><p class="page-desc">按<strong>对话段</strong>归档：一段沟通结束后，内容将<strong>压缩为摘要</strong>入库。</p>${renderArchiveFilter()}${renderActions(pg.actions||[])}${renderChatArchiveTable()}</div>`}
else if(pg.type==='memoirQb'){h+=renderMemoirQbPage();if(can('create'))setTimeout(()=>{document.querySelectorAll('.toolbar .btn').forEach(btn=>{if(btn.textContent.includes('Word'))btn.onclick=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.doc,.docx';inp.onchange=()=>{for(let i=0;i<20;i++)memoirQuestions.push({id:memoirQuestions.length+1,category:'导入题目',content:'【Word导入】批量题目',enabled:true});toast('已导入20题');render()};inp.click()};if(btn.textContent.includes('新增题目'))btn.onclick=()=>{memoirQuestions.push({id:memoirQuestions.length+1,category:'童年记忆',content:'【新增】请补充回忆。',enabled:true});toast('已新增');render()}})},0)}
else if(path==='/users/memoir-answers'){h+=renderMemoirAnswersPage()}
else if(pg.type==='memoirManage'){h+=renderMemoirManagePage()}
else if(pg.type==='kbAudit'){h+=renderKbAuditPage()}
else if(pg.type==='ecFamily'){h+=renderEcFamilyPage()}
else if(pg.type==='ecMessage'){h+=renderEcMessagePage()}
else if(pg.type==='ecCommunity'){h+=renderEcCommunityPage()}
else if(pg.type==='ecIot'){h+=renderEcIotPage()}
else if(pg.type==='voiceDialog'){h+=renderVoiceDialogPage()}
else if(pg.type==='aiMemory'){h+=renderAiMemoryPage()}
else if(pg.type==='sysAccount'){h+=renderSysAccountPage()}
else if(pg.type==='accountSettings'){h+=renderAccountSettingsPage()}
else{h+=`<div class="card"><h2>${pg.title}</h2><div class="filter"><input placeholder="搜索"><button class="btn" onclick="toast('查询中')">查询</button><button class="btn" onclick="toast('筛选中')">筛选</button>${pg.date?'<input type="date"> 至 <input type="date">':''}</div>${renderActions(pg.actions||[])}${renderTable(pg.cols,pg.rows)}</div>`}
el.innerHTML=h}
function render(){renderMenu();renderMain()}
render();
</script>
</body>
</html>
